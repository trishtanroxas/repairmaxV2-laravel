services:
  postgres:
    image: postgres:16
    container_name: n8n-postgres
    restart: always
    environment:
      POSTGRES_USER: n8n_user
      POSTGRES_PASSWORD: n8n_password
      POSTGRES_DB: n8n_db
    volumes:
      - n8n_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n8n_user -d n8n_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - n8n_network

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n-app
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5678:443"
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n_db
      - DB_POSTGRESDB_USER=n8n_user
      - DB_POSTGRESDB_PASSWORD=n8n_password
      - N8N_ENCRYPTION_KEY=repairmax_master_key_2026_xyz
      - N8N_HOST=repairmax.n8n.app
      - N8N_PORT=443
      - N8N_PROTOCOL=https
      - N8N_SECURE_COOKIE=true
      - N8N_EDITOR_BASEURL=https://repairmax.n8n.app
      - N8N_TRUSTED_HOSTS=repairmax.n8n.app,localhost,127.0.0.1
      - GENERIC_TIMEZONE=Asia/Manila
      # - GOOGLE_APPLICATION_CREDENTIALS=/home/node/google-credentials.json
    volumes:
      - n8n_data:/home/node/.n8n
      # Uncomment the line below if you want to use Google Cloud credentials.
      # Place your credentials file as 'google-credentials.json' in this directory (safely ignored by git).
      # - ./google-credentials.json:/home/node/google-credentials.json
    networks:
      - n8n_network

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared-n8n
    restart: always
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - n8n
    networks:
      - n8n_network

networks:
  n8n_network:
    driver: bridge

volumes:
  n8n_db_data:
  n8n_data:
